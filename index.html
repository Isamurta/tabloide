<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabloide Ouro Motos - Ofertas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@400;900&display=swap');
        
        /* Configuração para impressão A4 e Visualização Web */
        @page { size: A4; margin: 0; }
        body { font-family: 'Roboto', sans-serif; margin: 0; padding: 0; background-color: #555; text-transform: uppercase; }

        /* Container para visualização "folheável" no navegador */
        .catalog-container { display: flex; flex-direction: column; align-items: center; padding: 20px 0; }

        .page {
            width: 210mm;
            height: 297mm;
            background-color: #fff;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
            box-sizing: border-box;
            border: 10px solid #cc0000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Capa */
        .cover { background: #cc0000; color: #fff; justify-content: center; align-items: center; text-align: center; }
        .cover h1 { font-family: 'Anton', sans-serif; font-size: 80px; color: #ffcc00; -webkit-text-stroke: 2px black; margin: 0; }
        .cover h2 { font-size: 35px; margin: 10px 0; }
        .cover-img { width: 140mm; height: 140mm; background: #fff; border-radius: 50%; border: 10px solid #ffcc00; display: flex; justify-content: center; align-items: center; margin: 20px auto; overflow: hidden; }
        .cover-img img { width: 110%; }

        /* Cabeçalho das páginas internas */
        .header { background: #cc0000; color: #fff; text-align: center; padding: 15px; margin-bottom: 15px; }
        .header h1 { font-family: 'Anton', sans-serif; font-size: 50px; color: #ffcc00; margin: 0; -webkit-text-stroke: 1px black; }

        /* Grid de Motos */
        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr); gap: 15px; padding: 0 15px; flex-grow: 1; }
        .card { border: 3px solid #000; border-radius: 10px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 10px; background: radial-gradient(circle, #fff 0%, #eee 100%); text-align: center; }
        .card img { max-width: 100%; max-height: 50mm; object-fit: contain; }
        .card-model { font-family: 'Anton', sans-serif; font-size: 19px; color: #cc0000; margin: 5px 0; height: 42px; display: flex; align-items: center; }
        .card-year { background: #000; color: #ffcc00; font-size: 24px; font-weight: 900; padding: 2px 15px; border-radius: 5px; }

        /* Rodapé Consórcio */
        .footer-consortium { background: linear-gradient(to right, #004a99, #002e60); color: #fff; text-align: center; padding: 10px; }
        .footer-consortium h3 { margin: 0; color: #ffcc00; font-size: 20px; }

        /* Página de Contato Final */
        .contact-page { background: #004a99; color: #fff; text-align: center; justify-content: center; align-items: center; }

        @media print {
            body { background: none; }
            .catalog-container { padding: 0; }
            .page { margin: 0; box-shadow: none; page-break-after: always; }
        }
    </style>
</head>
<body>
    <div class="catalog-container">
        <div class="page cover">
            <h1>OURO MOTOS</h1>
            <h2>OFERTAS DA SEMANA</h2>
            <div class="cover-img">
                <img src="https://s3.carro57.com.br/FC/5526/7808564_1_W_45c10b3e2d.jpeg" alt="NC 750X">
            </div>
            <p style="font-size: 25px; background: #000; color: #ffcc00; padding: 10px 30px; font-weight: 900;">ESTOQUE COMPLETO</p>
        </div>

        <div class="page contact-page" style="border-color: #ffcc00;">
            <h1 style="color:#fff">CONSÓRCIO OURO MOTOS</h1>
            <div style="background:#fff; color:#000; padding:30px; border-radius:20px; width:80%; margin:20px auto; text-align:left; font-size:22px; font-weight:900;">
                <p>✅ CARTAS JÁ CONTEMPLADAS</p>
                <p>✅ CRÉDITOS DE R$ 10.000 A R$ 60.000</p>
                <p>✅ SEM JUROS BANCÁRIOS</p>
                <p>✅ PARCELAS ACESSÍVEIS</p>
            </div>
            <h2>FALE COM NOSSOS CONSULTORES</h2>
            <p style="font-size: 40px; background: #ffcc00; color: #000; padding: 10px 40px; border-radius: 50px; display: inline-block;">(31) 3551-2202</p>
        </div>
    </div>
</body>
</html>
