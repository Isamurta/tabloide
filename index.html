<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ouro Motos - Estoque</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #ccc;
  font-family: Arial, sans-serif;
}

/* PÁGINA A4 */
.page {
  width: 210mm;
  height: 297mm;
  background: #fff;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  page-break-after: always;
}

/* HEADER */
.header {
  height: 20mm;
  background: #0A2F5A;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10mm;
  font-weight: bold;
}

/* CONTEÚDO */
.content {
  flex: 1;
  padding: 5mm;
  overflow: hidden;
}

/* GRID 24 MOTOS */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(6, 1fr);
  gap: 3mm;
  height: 100%;
}

/* CARD */
.card {
  display: flex;
  flex-direction: column;
  border: 1px solid #eee;
  overflow: hidden;
}

/* IMAGEM */
.card-img {
  flex: 2;
}

.card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* INFO */
.card-info {
  flex: 1;
  background: #0A2F5A;
  color: white;
  font-size: 8pt;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 2px;
}

.card-title {
  font-weight: bold;
}

.card-year {
  color: gold;
  font-size: 9pt;
}

/* ESCONDER CARD VAZIO */
.hidden {
  visibility: hidden;
}

/* FOOTER */
.footer {
  height: 10mm;
  background: #0A2F5A;
  color: white;
  font-size: 8pt;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CONSÓRCIO */
.consorcio {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100%;
  text-align: center;
}

.consorcio h1 {
  font-size: 28pt;
  margin-bottom: 10mm;
}

.consorcio-box {
  display: flex;
  gap: 10mm;
  justify-content: center;
}

.consorcio-card {
  width: 60mm;
  height: 60mm;
  border-radius: 10px;
  background: #0A2F5A;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16pt;
  font-weight: bold;
}

@media print {
  body { background: none; }
  .page { margin: 0; }
}
</style>
</head>

<body>

<div id="pages"></div>

<!-- PÁGINA CONSÓRCIO -->
<div class="page">
  <div class="header">CONSÓRCIOS DISPONÍVEIS</div>
  <div class="content consorcio">
    <h1>REALIZE SUA MOTO SEM JUROS</h1>

    <div class="consorcio-box">
      <div class="consorcio-card">SUZUKI</div>
      <div class="consorcio-card">CANOPUS</div>
    </div>

    <p style="margin-top:10mm;">
      Parcelas acessíveis • Planos facilitados • Contemplação rápida
    </p>

    <p style="margin-top:5mm; font-weight:bold;">
      Fale agora: (31) 98751-2118
    </p>
  </div>
  <div class="footer">Ouro Motos</div>
</div>

<script>
const motos = [
  {title:"HONDA CG 160 TITAN", year:"2022", img:"https://placehold.co/300"},
  {title:"XRE 300", year:"2023", img:"https://placehold.co/300"},
  {title:"CB 300R", year:"2014", img:"https://placehold.co/300"},
  {title:"FAZER 250", year:"2020", img:"https://placehold.co/300"},
  {title:"BIZ 125", year:"2021", img:"https://placehold.co/300"},
  {title:"XJ6", year:"2015", img:"https://placehold.co/300"},
  {title:"LANDER 250", year:"2024", img:"https://placehold.co/300"},
  {title:"PCX 160", year:"2023", img:"https://placehold.co/300"},
  {title:"BROS 160", year:"2022", img:"https://placehold.co/300"},
  {title:"FAN 160", year:"2025", img:"https://placehold.co/300"},
  {title:"TITAN 150", year:"2013", img:"https://placehold.co/300"},
  {title:"YBR 150", year:"2025", img:"https://placehold.co/300"},
];

const PER_PAGE = 24;
const container = document.getElementById("pages");

for (let i = 0; i < motos.length; i += PER_PAGE) {

  let slice = motos.slice(i, i + PER_PAGE);

  while (slice.length < PER_PAGE) {
    slice.push({title:"", year:"", img:""});
  }

  const page = document.createElement("div");
  page.className = "page";

  page.innerHTML = `
    <div class="header">ESTOQUE DISPONÍVEL</div>
    <div class="content">
      <div class="grid">
        ${slice.map(m => `
          <div class="card ${!m.title ? 'hidden' : ''}">
            <div class="card-img">
              <img src="${m.img || 'https://placehold.co/300'}">
            </div>
            <div class="card-info">
              <div class="card-title">${m.title}</div>
              <div class="card-year">${m.year}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="footer">(31) 98751-2118</div>
  `;

  container.appendChild(page);
}
</script>

</body>
</html>
