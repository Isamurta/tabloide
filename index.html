<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --navy: #0A2F5A;
    --navy-dark: #041F3A;
    --red: #CC0000;
    --red-dark: #990000;
    --white: #FFFFFF;
    --gray-light: #F5F7FA;
    --gold: #FFD700;
  }

  body {
    background: #e0e0e0;
    font-family: 'Montserrat', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px 0;
  }

  .page {
    width: 210mm;
    height: 297mm;
    background: var(--white);
    margin: 8mm auto;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    page-break-after: always;
    break-after: page;
  }

  .page-header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
    padding: 3mm 6mm;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--gold);
    flex-shrink: 0;
  }

  .logo-area img {
    height: 38px;
    width: auto;
    display: block;
  }

  .header-tag {
    background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
    color: var(--white);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13pt;
    padding: 2mm 8mm;
    letter-spacing: 2px;
    border-radius: 30px;
  }

  .header-phone {
    color: var(--gold);
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 12pt;
    text-align: right;
  }

  .page-content {
    flex: 1;
    padding: 4mm 5mm;
    display: flex;
    flex-direction: column;
    background: var(--gray-light);
    min-height: 0;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18pt;
    color: var(--navy);
    letter-spacing: 2px;
    margin-bottom: 4mm;
    padding-bottom: 2mm;
    border-bottom: 3px solid var(--red);
    display: inline-block;
    align-self: flex-start;
    flex-shrink: 0;
  }

  /* Cabeçalho de categoria (ex: MOTOS) */
  .category-header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
    color: var(--gold);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16pt;
    padding: 2mm 6mm;
    border-radius: 30px;
    margin: 2mm 0 4mm 0;
    display: inline-block;
    letter-spacing: 1px;
  }

  .vehicle-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 3.5mm;
    flex: 1;
    min-height: 0;
  }

  .vehicle-card {
    background: var(--white);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    border: 1px solid rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
  }

  .card-img-wrap {
    position: relative;
    flex: 1;
    min-height: 0;
    background: #e8eaed;
    overflow: hidden;
  }

  .card-img-wrap img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  .card-badge {
    position: absolute;
    top: 1.5mm;
    left: 1.5mm;
    background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
    color: var(--white);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 6.5pt;
    padding: 0.8mm 3mm;
    border-radius: 20px;
    z-index: 2;
  }

  .card-info {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
    padding: 2mm;
    text-align: center;
    flex-shrink: 0;
  }

  .card-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 7pt;
    color: var(--white);
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 9pt;
    color: var(--gold);
    margin-top: 1px;
  }

  .page-footer {
    background: linear-gradient(135deg, var(--navy-dark) 0%, #020e1a 100%);
    padding: 1.5mm 5mm;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 2px solid var(--gold);
    flex-shrink: 0;
  }

  .page-footer p {
    color: rgba(255,255,255,0.6);
    font-size: 5.5pt;
  }

  .page-number {
    font-size: 6.5pt;
    color: var(--gold);
    font-weight: bold;
  }

  @media print {
    @page { size: A4; margin: 0; }
    body { background: none; margin: 0; padding: 0; }
    .page { margin: 0; box-shadow: none; }
  }
</style>
</head>

// ===== ORDENAÇÃO POR MODELO (alfabética) =====
function ordenarPorModelo(arr) {
  return arr.sort((a, b) => {
    let modeloA = a.title.replace(/\s+\d{4}$/, '').trim().toLowerCase();
    let modeloB = b.title.replace(/\s+\d{4}$/, '').trim().toLowerCase();
    return modeloA.localeCompare(modeloB);
  });
}

const carrosOrdenados = ordenarPorModelo([...carros]);
const quadriciclosOrdenados = ordenarPorModelo([...quadriciclos]);

const PER_PAGE = 20;
const container = document.getElementById('vehicle-pages');
const totalPages = Math.ceil(allVehicles.length / PER_PAGE);

// Função para criar uma página
function criarPagina(veiculosDaPagina, numeroPagina, exibirCategoria = false, nomeCategoria = "") {
  const page = document.createElement('div');
  page.className = 'page';

  // Header
  const header = document.createElement('div');
  header.className = 'page-header';
  header.innerHTML = `
    <div class="logo-area"><img src="logo_ouro_principal.jpg" alt="Ouro Motos" onerror="this.src='https://placehold.co/200x45/0A2F5A/white?text=OURO+MOTOS'"></div>
    <div class="header-tag">ESTOQUE OFICIAL</div>
    <div class="header-phone">(31) 98751-2118</div>
  `;
  page.appendChild(header);

  const content = document.createElement('div');
  content.className = 'page-content';
  
  const title = document.createElement('div');
  title.className = 'section-title';
  title.textContent = 'ESTOQUE COMPLETO';
  content.appendChild(title);

  // Exibir cabeçalho da categoria se necessário (primeira página de cada bloco)
  if (exibirCategoria) {
    const catHeader = document.createElement('div');
    catHeader.className = 'category-header';
    catHeader.innerHTML = `<i class="fas fa-tag"></i> ${nomeCategoria}`;
    content.appendChild(catHeader);
  }

  const grid = document.createElement('div');
  grid.className = 'vehicle-grid';

  veiculosDaPagina.forEach(vehicle => {
    let displayTitle = vehicle.title.replace(/\s+\d{4}$/, '').trim();
    const card = document.createElement('div');
    card.className = 'vehicle-card';
    card.innerHTML = `
      <div class="card-img-wrap">
        <div class="card-badge"><i class="fas fa-check"></i> DISPONÍVEL</div>
        <img src="${vehicle.img}" alt="${displayTitle}" loading="lazy" onerror="this.src='https://placehold.co/300x200/CC0000/white?text=OURO+MOTOS'">
      </div>
      <div class="card-info">
        <div class="card-title">${displayTitle}</div>
        <div class="card-year">ANO ${vehicle.year}</div>
      </div>
    `;
    grid.appendChild(card);
  });

  // Preencher slots vazios (caso a última página não tenha 20 itens)
  const slotsRestantes = PER_PAGE - veiculosDaPagina.length;
  for (let i = 0; i < slotsRestantes; i++) {
    const emptyCard = document.createElement('div');
    emptyCard.style.visibility = 'hidden';
    emptyCard.style.height = '0';
    emptyCard.style.padding = '0';
    grid.appendChild(emptyCard);
  }

  content.appendChild(grid);
  page.appendChild(content);

  // Footer
  const footer = document.createElement('div');
  footer.className = 'page-footer';
  footer.innerHTML = `
    <p>Ouro Motos - Todos os veículos disponíveis para venda e troca</p>
    <p class="page-number">PÁG. ${numeroPagina}</p>
  `;
  page.appendChild(footer);

  return page;
}

// Gerar páginas respeitando a ordem: Motos, Carros, Quadriciclos
let currentPageNumber = 1;
let currentIndex = 0;

// Função auxiliar para processar um bloco de veículos
function processarBloco(veiculos, nomeCategoria) {
  const paginasGeradas = [];
  const totalItens = veiculos.length;
  let inicioBloco = true;

  for (let i = 0; i < totalItens; i += PER_PAGE) {
    const slice = veiculos.slice(i, i + PER_PAGE);
    const pagina = criarPagina(slice, currentPageNumber++, inicioBloco, nomeCategoria);
    paginasGeradas.push(pagina);
    inicioBloco = false;
  }
  return paginasGeradas;
}

// Processar Motos
const paginasMotos = processarBloco(motosOrdenadas, "🏍 MOTOS");

// Processar Carros
const paginasCarros = processarBloco(carrosOrdenados, "🚗 CARROS");

// Processar Quadriciclos
const paginasQuadriciclos = processarBloco(quadriciclosOrdenados, "🛺 QUADRICICLOS");

// Adicionar todas as páginas ao container
[...paginasMotos, ...paginasCarros, ...paginasQuadriciclos].forEach(pagina => {
  container.appendChild(pagina);
});

console.log(`\n📄 Total de páginas geradas: ${currentPageNumber - 1}`);

console.log(`✅ VERIFICAÇÃO APROVADA: O número total de itens no catálogo corresponde ao estoque original.`);
